      line-height: 1.8;
    }

    .prose h1 {
      font-size: 1.875rem;
      font-weight: 700;
      color: #131314;
      margin: 0 0 1.5rem;
      line-height: 1.25;
    }

    .prose h2 {
      font-size: 1.25rem;
      font-weight: 700;
      color: #131314;

      font-weight: 700;
      color: #2A2520;
      margin: 2rem 0 0.5rem;
    }

    .prose h4 {
      font-size: 0.75rem;
      font-weight: 700;
      color: #6B6560;
      margin: 1.5rem 0 0.5rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    .prose p {
      margin: 1rem 0;
    }

    .prose a {
      color: #D97757;
      text-decoration: underline;
      text-underline-offset: 3px;
    }

    .prose a:hover {
      color: #C06543;
    }

    .prose strong {
      color: #131314;
      font-weight: 700;
    }

    .prose em {
      color: #4A4540;
      font-style: italic;
    }

    /* inline code */
    .prose :not(pre)>code {
      color: #D97757;
      background: rgba(217, 119, 87, 0.1);
      border: 1px solid rgba(217, 119, 87, 0.15);
      padding: 0.12em 0.45em;
      border-radius: 4px;
      font-family: 'Space Mono', monospace;
      font-size: 0.825em;
    }

    /* code block */
    .prose pre {
      background: #F0EBE3;
      border: 1px solid #E5DED6;
      border-radius: 12px;
      padding: 1.25rem 1.5rem;
      margin: 1.5rem 0;
      overflow-x: auto;
    }

    .prose pre code {
      background: none;
      border: none;
      color: inherit;
      padding: 0;
      font-size: 0.8125rem;
      font-family: 'Space Mono', monospace;
    }

    .prose blockquote {
      border-left: 3px solid #D97757;
      padding-left: 1.25rem;
      margin: 1.5rem 0;
      color: #6B6560;
      font-style: italic;
    }

    .prose blockquote p {
      margin: 0.5rem 0;
    }

    .prose ul {
      list-style-type: disc;
      padding-left: 1.5rem;
      margin: 1rem 0;
    }

    .prose ol {
      list-style-type: decimal;
      padding-left: 1.5rem;
      margin: 1rem 0;
    }

    .prose li {
      margin: 0.4rem 0;
    }

    .prose li>ul,
    .prose li>ol {
      margin: 0.25rem 0;
    }

    .prose hr {
      border: none;
      border-top: 1px solid #E5DED6;
      margin: 2.5rem 0;
    }

    .prose table {
      width: 100%;
      border-collapse: collapse;
      margin: 1.5rem 0;
      font-size: 0.875rem;
    }

    .prose th {
      background: #F0EBE3;
      color: #131314;
      font-weight: 700;
      padding: 0.6rem 1rem;
      border: 1px solid #E5DED6;
      text-align: left;
    }

    .prose td {
      padding: 0.6rem 1rem;
      border: 1px solid #E5DED6;
    }

    .prose tr:nth-child(even) td {
      background: rgba(240, 235, 227, 0.6);
    }

    .prose img {
      max-width: 100%;
      border-radius: 8px;
      margin: 1.5rem auto;
      display: block;
    }

    /* hljs theme override: keep background transparent inside .prose pre */
    .prose pre .hljs {
      background: transparent;
      padding: 0;
    }

    /* Mermaid diagram container */
    .prose .mermaid {
      background: #FDFCFB;
      border: 1px solid #E5DED6;
      border-radius: 12px;
      padding: 1.5rem;
      margin: 1.5rem 0;
      overflow-x: auto;
      text-align: center;
    }

    .prose .mermaid svg {
      max-width: 100%;

    }
  </style>

  <!-- ─── JS ────────────────────────────────────────────────────────── -->
  <script>
    // ═══════════════════════════════════════════════════════════════════════
    //  POST CONFIG
    //  Điền src khi có link markdown từ GitHub.
    //  src nhận cả hai dạng:
    //    • Raw URL : https://raw.githubusercontent.com/user/repo/branch/file.md
    //    • Blob URL: https://github.com/user/repo/blob/branch/file.md  (auto-convert)
    // ═══════════════════════════════════════════════════════════════════════
    const BASE = 'https://raw.githubusercontent.com/phuc-nt/kioku-agent-kit-lite/main/docs/architecture/';
    const BLOG_BASE = 'https://raw.githubusercontent.com/phuc-nt/kioku-agent-kit-lite/main/docs/blog/';

    const POSTS = [
      {
        slug: 'kioku-intro',
        title: 'Kioku: Why I built a Knowledge Graph memory engine for my AI agents',
        date: '2026-03-02',
        desc: 'The idea, architecture, and journey of building Kioku — an open-source Personal Memory Engine for AI Agents.',
        tags: ['blog', 'english', 'intro'],
        src: BLOG_BASE + '2026-03-02-kioku-lite-intro-en.md',
      },
      {
        slug: 'kioku-intro-ja',
        title: 'Kioku: なぜ私はAIエージェントのためにKnowledge Graphメモリエンジンを自作したのか',
        date: '2026-03-02',
        desc: 'Kiokuの着想、アーキテクチャ、開発の軌跡 — AIエージェント向けオープンソースPersonal Memory Engine。',
        tags: ['blog', 'japanese', 'intro'],
        src: BLOG_BASE + '2026-03-02-kioku-lite-intro-ja.md',
      },
      {
        slug: 'kioku-intro-vn',
        title: 'Kioku: Tại sao tôi tự build một bộ nhớ có Knowledge Graph cho AI agent của mình',
        date: '2026-03-02',
        desc: 'Ý tưởng, kiến trúc, và hành trình xây dựng Kioku — một Personal Memory Engine open-source cho AI Agent.',
        tags: ['blog', 'vietnamese', 'intro'],
        src: BLOG_BASE + '2026-03-02-kioku-lite-intro.md',
      },
      {
        slug: 'kioku-server-roadmap',
        title: 'From SQLite to the Cloud: Kioku Architecture & the Road to kioku-server',
        date: '2026-03-04',
        desc: 'Deep dive into kioku-lite\'s tri-hybrid architecture, the hub node fix (v0.1.27–0.1.28), and the kioku-server roadmap (MCP interface, ChromaDB, FalkorDB, multi-tenant). Includes detailed comparison with Anthropic\'s MCP Memory Server.',
        tags: ['blog', 'english', 'architecture', 'roadmap'],
        src: BLOG_BASE + '2026-03-04-kioku-server-roadmap-en.md',
      },
      {
        slug: 'kioku-server-roadmap-ja',
        title: 'SQLiteからクラウドへ：Kiokuのアーキテクチャとkioku-serverへのロードマップ',
        date: '2026-03-04',
        desc: 'kioku-liteのトライハイブリッドアーキテクチャ、ハブノード修正（v0.1.27–0.1.28）、kioku-serverロードマップ（MCPインターフェース、ChromaDB、FalkorDB、マルチテナント）の詳細。AnthropicのMCP Memory Serverとの比較も含む。',
        tags: ['blog', 'japanese', 'architecture', 'roadmap'],
        src: BLOG_BASE + '2026-03-04-kioku-server-roadmap-ja.md',
      },
      {
        slug: 'kioku-server-roadmap-vn',
        title: 'Từ SQLite lên Cloud: Kiến trúc Kioku và lộ trình kioku-server',
        date: '2026-03-04',
        desc: 'Kiến trúc tri-hybrid của kioku-lite, bản fix hub node (v0.1.27–0.1.28), và lộ trình kioku-server (MCP interface, ChromaDB, FalkorDB, multi-tenant). Bao gồm so sánh chi tiết với MCP Memory Server của Anthropic.',
        tags: ['blog', 'vietnamese', 'architecture', 'roadmap'],
        src: BLOG_BASE + '2026-03-04-kioku-server-roadmap.md',
      },
      {
        slug: 'system-architecture',
        title: 'System Architecture',
        date: '2026-03-02',
        desc: 'System overview: tri-hybrid search (BM25 + Vector + KG), data flow from save → index → search → recall.',
        tags: ['architecture', 'overview'],
        src: BASE + '01-system.md',
      },
      {
        slug: 'write-save-kg-index',
        title: 'Write Architecture — Save & KG Index',
        date: '2026-03-02',
        desc: 'Detailed write pipeline: save memory to SQLite FTS5 + sqlite-vec, then agent autonomously kg-indexes entities & relationships.',
        tags: ['architecture', 'write', 'kg'],
        src: BASE + '02-write-save-kg-index.md',
      },
      {
        slug: 'search-architecture',
        title: 'Search Architecture',
        date: '2026-03-02',
        desc: 'Tri-hybrid search pipeline: BM25 keyword → vector semantic → KG traversal, fused by Reciprocal Rank Fusion (RRF) reranker.',
        tags: ['architecture', 'search', 'rrf'],
        src: BASE + '03-search.md',
      },
      {
        slug: 'kg-open-schema',
        title: 'KG Open Schema',
        date: '2026-03-02',
        desc: 'Open entity & relationship model: agent defines types freely with no rigid schema. Supports aliases, weights, and metadata.',
        tags: ['architecture', 'kg', 'schema'],
        src: BASE + '04-kg-open-schema.md',
      },
      {
        slug: 'memory-comparison',
        title: 'Memory Comparison',
        date: '2026-03-02',
        desc: 'Kioku Lite vs Mem0 vs Claude Code vs OpenClaw: infrastructure, LLM usage, search quality, and trade-off analysis.',
        tags: ['comparison', 'overview'],
        src: BASE + '05-memory-comparison.md',
      },
    ];

    // ═══════════════════════════════════════════════════════════════════════
    //  UTILITIES
    // ═══════════════════════════════════════════════════════════════════════

    /** Convert GitHub blob URL → raw.githubusercontent.com URL for fetch. */
    function toRawUrl(url) {
      if (!url) return '';
      return url
        .replace('https://github.com/', 'https://raw.githubusercontent.com/')
        .replace('/blob/', '/');
    }

    /** Strip YAML front matter (---…---) from markdown string. */
    function stripFrontMatter(md) {
      if (!md.startsWith('---')) return md;
      const end = md.indexOf('\n---', 3);
      return end !== -1 ? md.slice(end + 4).trimStart() : md;
    }

    /** Read URL hash → slug (empty string = list view). */
    function getSlug() { return location.hash.slice(1); }

    /** Format ISO date → English locale. */
    function fmtDate(iso) {
      if (!iso) return '';
      try {
        return new Date(iso).toLocaleDateString('en-US', {
          year: 'numeric', month: 'long', day: 'numeric',
        });
      } catch { return iso; }
    }

    /** Render a tag badge span. */
    function badge(tag) {
      return `<span class="inline-block text-xs px-2 py-0.5 rounded-full border border-accent/25 text-accent/70 bg-accent/5 tracking-wide">${tag}</span>`;
    }

    // ═══════════════════════════════════════════════════════════════════════
    //  MERMAID INIT (light theme, manual trigger)
    // ═══════════════════════════════════════════════════════════════════════
    mermaid.initialize({
      startOnLoad: false,
      theme: 'base',
      themeVariables: {
        primaryColor: '#F0EBE3',
        primaryBorderColor: '#D97757',
        primaryTextColor: '#131314',
        lineColor: '#6B6560',
        secondaryColor: '#F9F6F2',
        tertiaryColor: '#FFFFFF',
        edgeLabelBackground: '#FDFCFB',
        fontFamily: "'Space Mono', monospace",
        fontSize: '13px',
      },
    });

    // ═══════════════════════════════════════════════════════════════════════
    //  MARKED CONFIG
    // ═══════════════════════════════════════════════════════════════════════
    marked.use({
      gfm: true,
      breaks: false,
      renderer: {
        // Open all links in new tab
        link({ href, title, text }) {
          const titleAttr = title ? ` title="${title}"` : '';
          return `<a href="${href || ''}"${titleAttr} target="_blank" rel="noopener noreferrer">${text}</a>`;
        },
        // Intercept ```mermaid blocks → render as <div class="mermaid"> (not <pre><code>)
        code({ text, lang }) {
          if (lang === 'mermaid') {
            return `<div class="mermaid">${text}</div>`;
          }
          return false; // default rendering for all other languages
        },
      },
    });

    // ═══════════════════════════════════════════════════════════════════════
    //  LIST VIEW
    // ═══════════════════════════════════════════════════════════════════════
    function renderList() {
      document.title = 'Docs — Kioku Lite';
      document.getElementById('nav-label').textContent = '// DOCS';

      const cards = POSTS.map(p => {
        const ready = !!p.src;
        const tagHtml = p.tags.map(badge).join(' ');
        const dateHtml = p.date ? `<span class="text-xs text-text-muted">${fmtDate(p.date)}</span>` : '';
        const statusBadge = ready
          ? ''
          : `<span class="shrink-0 text-xs px-2 py-0.5 rounded-full bg-muted/40 text-text-muted border border-border">coming soon</span>`;

        // If ready → clickable <a>; otherwise → inert <div>
        const Tag = ready ? 'a' : 'div';
        const href = ready ? `href="blog.html#${p.slug}"` : '';
        const dim = ready ? '' : 'opacity-55 cursor-default';

        return `
      <${Tag} ${href} class="doc-card bg-surface border border-border rounded-2xl p-6 flex flex-col gap-3 ${dim}" style="text-decoration:none">
        <div class="flex items-start justify-between gap-3">
          <h2 class="text-sm font-bold text-text leading-snug">${p.title}</h2>
          ${statusBadge}
        </div>
        <p class="text-xs text-text-muted leading-relaxed flex-1">${p.desc}</p>
        <div class="flex items-center justify-between flex-wrap gap-2 mt-auto pt-3 border-t border-border/50">
          <div class="flex flex-wrap gap-1.5">${tagHtml}</div>
          ${dateHtml}
        </div>
      </${Tag}>
    `;
      }).join('');

      const readyCount = POSTS.filter(p => p.src).length;

      document.getElementById('app').innerHTML = `
    <!-- Hero -->
    <section class="pt-32 pb-10 px-4 sm:px-6 lg:px-8 max-w-5xl mx-auto text-center">
      <div class="inline-flex items-center gap-2 bg-accent/10 border border-accent/30
                  text-accent text-xs px-4 py-1.5 rounded-full mb-6">
        <svg viewBox="0 0 24 24" class="w-3 h-3" fill="none" stroke="currentColor" stroke-width="2"
             stroke-linecap="round" stroke-linejoin="round">
          <path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/>
          <polyline points="14 2 14 8 20 8"/>
          <line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/>
          <polyline points="10 9 9 9 8 9"/>
        </svg>
        Documentation
      </div>
      <h1 class="text-3xl sm:text-4xl font-bold leading-tight mb-4">
        Kioku Lite <span class="text-accent">Docs</span>
      </h1>
      <p class="text-text-muted text-sm max-w-lg mx-auto" style="line-height:1.75;">
        Technical docs, integration guides and system architecture.<br>
        ${readyCount > 0 ? `${readyCount}/${POSTS.length} articles available.` : 'Content coming soon.'}
      </p>
    </section>

    <!-- Grid -->
    <section class="pb-24 px-4 sm:px-6 lg:px-8 max-w-5xl mx-auto">
      <div class="flex items-center gap-4 mb-8">
        <p class="text-xs text-accent tracking-widest whitespace-nowrap">// ${POSTS.length} docs</p>
        <div class="flex-1 border-t border-border"></div>
        <p class="text-xs text-text-muted whitespace-nowrap">
          ${readyCount > 0 ? `${readyCount} available` : 'coming soon'}
        </p>
      </div>
      <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
        ${cards}
      </div>
    </section>
  `;
    }

    // ═══════════════════════════════════════════════════════════════════════
    //  POST DETAIL VIEW
    // ═══════════════════════════════════════════════════════════════════════
    async function renderPost(slug) {
      const post = POSTS.find(p => p.slug === slug);

      if (!post) {
        return renderError('Post not found.', slug);
      }
      if (!post.src) {
        return renderError(`"${post.title}" has no content yet — check back soon!`, slug);
      }

      document.title = `${post.title} — Kioku Lite Docs`;
      document.getElementById('nav-label').textContent = `// ${post.title.toUpperCase()}`;

      // Loading indicator
      document.getElementById('app').innerHTML = `
    <div class="pt-40 pb-24 flex flex-col items-center justify-center gap-4 text-text-muted">
      <svg class="w-6 h-6 text-accent" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
           style="animation:spin 1s linear infinite">
        <circle cx="12" cy="12" r="10" opacity="0.2"/>
        <path d="M12 2a10 10 0 0110 10" stroke-linecap="round"/>
      </svg>
      <span class="text-xs tracking-widest">Loading…</span>
    </div>
    <style>@keyframes spin{to{transform:rotate(360deg)}}</style>
  `;

      try {
        const rawUrl = toRawUrl(post.src);
        const res = await fetch(rawUrl);
        if (!res.ok) throw new Error(`HTTP ${res.status} — ${res.statusText}`);

        const rawMd = await res.text();
        let md = stripFrontMatter(rawMd);

        // Resolve relative image paths to absolute GitHub raw URLs
        const srcDir = rawUrl.substring(0, rawUrl.lastIndexOf('/') + 1);
        md = md.replace(/!\[([^\]]*)\]\((?!https?:\/\/)([^)]+)\)/g, (_, alt, path) => {
          return `![${alt}](${srcDir}${path})`;
        });

        const html = marked.parse(md);

        const tagHtml = post.tags.map(badge).join(' ');
        const dateHtml = post.date
          ? `<span class="text-xs text-text-muted">${fmtDate(post.date)}</span>`
          : '';

        document.getElementById('app').innerHTML = `
      <div class="pt-28 pb-24 px-4 sm:px-6 lg:px-8 max-w-3xl mx-auto">

        <!-- Back (top) -->
        <a href="blog.html"
           class="inline-flex items-center gap-2 text-xs text-text-muted hover:text-accent
                  transition-colors mb-10 group">
          <svg viewBox="0 0 24 24" class="w-3.5 h-3.5" fill="none" stroke="currentColor"
               stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M19 12H5M12 5l-7 7 7 7"/>
          </svg>
          All docs
        </a>

        <!-- Post header -->
        <header class="mb-10 pb-8 border-b border-border">
          <div class="flex flex-wrap gap-1.5 mb-4">${tagHtml}</div>
          <h1 class="text-2xl sm:text-3xl font-bold text-text leading-tight mb-3">${post.title}</h1>
          <p class="text-text-muted text-sm leading-relaxed mb-5">${post.desc}</p>
          <div class="flex items-center gap-5 flex-wrap">
            ${dateHtml}
            <a href="${rawUrl}" target="_blank" rel="noopener noreferrer"
               class="inline-flex items-center gap-1.5 text-xs text-text-muted
                      hover:text-accent transition-colors">
              <svg viewBox="0 0 24 24" class="w-3.5 h-3.5" fill="none" stroke="currentColor"
                   stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M9 19c-5 1.5-5-2.5-7-3m14 6v-3.87a3.37 3.37 0 00-.94-2.61
                         c3.14-.35 6.44-1.54 6.44-7A5.44 5.44 0 0020 4.77
                         5.07 5.07 0 0019.91 1S18.73.65 16 2.48a13.38 13.38 0 00-7 0
                         C6.27.65 5.09 1 5.09 1A5.07 5.07 0 005 4.77
                         a5.44 5.44 0 00-1.5 3.78c0 5.42 3.3 6.61 6.44 7
                         A3.37 3.37 0 009 18.13V22"/>
              </svg>
              View source on GitHub
            </a>
          </div>
        </header>

        <!-- Rendered markdown -->
        <article class="prose" id="post-body">
          ${html}
        </article>

        <!-- Back (bottom) -->
        <div class="mt-16 pt-8 border-t border-border">
          <a href="blog.html"
             class="inline-flex items-center gap-2 text-xs text-text-muted
                    hover:text-accent transition-colors group">
            <svg viewBox="0 0 24 24" class="w-3.5 h-3.5" fill="none" stroke="currentColor"
                 stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M19 12H5M12 5l-7 7 7 7"/>
            </svg>
            Back to all docs
          </a>
        </div>

      </div>
    `;

        // Syntax highlight all code blocks (skip mermaid divs — those are not <pre><code>)
        document.querySelectorAll('#post-body pre code').forEach(el => hljs.highlightElement(el));

        // Render mermaid diagrams
        const mermaidNodes = document.querySelectorAll('#post-body .mermaid');
        if (mermaidNodes.length > 0) {
          mermaid.run({ nodes: mermaidNodes });
        }

      } catch (err) {
        renderError(`Could not load content: ${err.message}`, slug);
      }
    }

    // ═══════════════════════════════════════════════════════════════════════
    //  ERROR VIEW
    // ═══════════════════════════════════════════════════════════════════════
    function renderError(msg) {
      document.getElementById('app').innerHTML = `
    <div class="pt-40 pb-24 px-4 max-w-2xl mx-auto flex flex-col items-center gap-6 text-center">
      <svg viewBox="0 0 24 24" class="w-10 h-10 text-text-muted" fill="none" stroke="currentColor"
           stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/>
        <line x1="9" y1="9" x2="15" y2="15"/>
      </svg>
      <p class="text-text-muted text-sm leading-relaxed">${msg}</p>
      <a href="blog.html"
         class="inline-flex items-center gap-2 border border-accent/40 hover:border-accent
                text-accent text-xs px-4 py-2 rounded-lg transition-colors">
        <svg viewBox="0 0 24 24" class="w-3.5 h-3.5" fill="none" stroke="currentColor"
             stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M19 12H5M12 5l-7 7 7 7"/>
        </svg>
        Back to list
      </a>
    </div>
  `;
    }

    // ═══════════════════════════════════════════════════════════════════════
    //  ROUTER  (hash-based: blog.html = list, blog.html#slug = detail)
    // ═══════════════════════════════════════════════════════════════════════
    function route() {
      const slug = getSlug();
      window.scrollTo(0, 0);
      if (slug) renderPost(slug);
      else renderList();
    }

    window.addEventListener('hashchange', route);
    route();
  </script>

</body>

</html>
